<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Expenses - Smart Expense Tracker</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container-fluid">

      <!-- Back Button -->
      <button class="btn btn-outline-light me-3" onclick="goBack()">⬅ Back</button>

      <!-- Brand -->
      <a class="navbar-brand" href="index.html">💰 Expense Tracker</a>

      <div class="collapse navbar-collapse">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link" href="categories.html">Categories</a></li>
          <li class="nav-item"><a class="nav-link active" href="expenses.html">Expenses</a></li>
          <li class="nav-item"><a class="nav-link" href="reports.html">Reports</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <!-- Main Container -->
  <div class="container mt-4">
    <h2 class="text-center mb-4">💸 Manage Expenses</h2>

    <!-- Add Expense Form -->
    <div class="card p-4 shadow-sm mb-4">
      <h5>Add New Expense</h5>
      <form id="expenseForm">
        <div class="mb-3">
          <input type="number" id="amount" class="form-control" placeholder="Enter amount" required>
        </div>
        <div class="mb-3">
          <input type="date" id="date" class="form-control" required>
        </div>
        <div class="mb-3">
          <select id="category" class="form-select" required>
            <option value="">Select Category</option>
          </select>
        </div>
        <div class="mb-3">
          <textarea id="description" class="form-control" placeholder="Enter description"></textarea>
        </div>
        <button type="submit" class="btn btn-success">Add Expense</button>
      </form>
    </div>

    <!-- Expense List -->
    <div class="card p-4 shadow-sm">
      <h5>Expense List</h5>
      <table class="table table-striped">
        <thead>
          <tr>
            <th>ID</th>
            <th>Amount</th>
            <th>Date</th>
            <th>Category</th>
            <th>Description</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="expenseTableBody"></tbody>
      </table>
    </div>
  </div>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

  <!-- Script -->
  <script>
    const CATEGORY_API = "http://127.0.0.1:8000/api/categories/";
    const EXPENSE_API = "http://127.0.0.1:8000/api/expenses/";

    // Load Categories
    async function loadCategories() {
      const res = await fetch(CATEGORY_API);
      const categories = await res.json();

      const categorySelect = document.getElementById("category");
      categorySelect.innerHTML = '<option value="">Select Category</option>';

      categories.forEach(cat => {
        categorySelect.innerHTML += `<option value="${cat.id}">${cat.name}</option>`;
      });
    }

    // Fetch Expenses
    async function fetchExpenses() {
      const res = await fetch(EXPENSE_API);
      const data = await res.json();

      const tableBody = document.getElementById("expenseTableBody");
      tableBody.innerHTML = "";

      data.forEach(exp => {
        tableBody.innerHTML += `
          <tr>
            <td>${exp.id}</td>
            <td>₹${exp.amount}</td>
            <td>${exp.date}</td>
            <td>${exp.category}</td>
            <td>${exp.description || "-"}</td>
            <td>
              <button class="btn btn-danger btn-sm" onclick="deleteExpense(${exp.id})">Delete</button>
            </td>
          </tr>
        `;
      });
    }

    // Add Expense
    document.getElementById("expenseForm").addEventListener("submit", async (e) => {
      e.preventDefault();

      const expense = {
        amount: document.getElementById("amount").value,
        date: document.getElementById("date").value,
        category: document.getElementById("category").value,
        description: document.getElementById("description").value
      };

      await fetch(EXPENSE_API, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(expense)
      });

      document.getElementById("expenseForm").reset();
      fetchExpenses();
    });

    // Delete Expense
    async function deleteExpense(id) {
      await fetch(EXPENSE_API + id + "/", { method: "DELETE" });
      fetchExpenses();
    }

    // Back Button Logic
    function goBack() {
      if (document.referrer && document.referrer !== window.location.href) {
        window.history.back();
      } else {
        window.location.href = "index.html";
      }
    }

    // Init
    loadCategories();
    fetchExpenses();
  </script>

</body>
</html>
