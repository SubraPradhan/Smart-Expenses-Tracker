<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Categories - Smart Expense Tracker</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container-fluid">

      <!-- Back Button -->
      <button class="btn btn-outline-light me-3" onclick="goBack()">⬅ Back</button>

      <!-- Brand -->
      <a class="navbar-brand" href="index.html">💰 Expense Tracker</a>

      <div class="collapse navbar-collapse">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link active" href="categories.html">Categories</a></li>
          <li class="nav-item"><a class="nav-link" href="expenses.html">Expenses</a></li>
          <li class="nav-item"><a class="nav-link" href="reports.html">Reports</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <!-- Main Container -->
  <div class="container mt-4">
    <h2 class="text-center mb-4">📂 Manage Categories</h2>

    <!-- Add Category Form -->
    <div class="card p-4 shadow-sm mb-4">
      <h5>Add New Category</h5>
      <form id="categoryForm">
        <div class="mb-3">
          <input type="text" id="categoryName" class="form-control" placeholder="Enter category name" required>
        </div>
        <button type="submit" class="btn btn-primary">Add Category</button>
      </form>
    </div>

    <!-- Category List -->
    <div class="card p-4 shadow-sm">
      <h5>Category List</h5>
      <table class="table table-striped">
        <thead>
          <tr>
            <th>ID</th>
            <th>Category Name</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="categoryTableBody">
        </tbody>
      </table>
    </div>
  </div>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

  <!-- Script -->
  <script>
    const API_URL = "http://127.0.0.1:8000/api/categories/";

    // Fetch Categories
    async function fetchCategories() {
      const res = await fetch(API_URL);
      const data = await res.json();

      const tableBody = document.getElementById("categoryTableBody");
      tableBody.innerHTML = "";

      data.forEach(cat => {
        tableBody.innerHTML += `
          <tr>
            <td>${cat.id}</td>
            <td>${cat.name}</td>
            <td>
              <button class="btn btn-danger btn-sm" onclick="deleteCategory(${cat.id})">Delete</button>
            </td>
          </tr>
        `;
      });
    }

    // Add Category
    document.getElementById("categoryForm").addEventListener("submit", async (e) => {
      e.preventDefault();

      const name = document.getElementById("categoryName").value;

      await fetch(API_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ name })
      });

      document.getElementById("categoryForm").reset();
      fetchCategories();
    });

    // Delete Category
    async function deleteCategory(id) {
      await fetch(API_URL + id + "/", { method: "DELETE" });
      fetchCategories();
    }

    // Back Button Logic
    function goBack() {
      if (document.referrer && document.referrer !== window.location.href) {
        window.history.back();
      } else {
        window.location.href = "index.html";
      }
    }

    // Load Data
    fetchCategories();
  </script>

</body>
</html>
