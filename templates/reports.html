<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reports - Smart Expense Tracker</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container-fluid">

      <!-- Back Button -->
      <button class="btn btn-outline-light me-3" onclick="goBack()">⬅ Back</button>

      <!-- Brand -->
      <a class="navbar-brand" href="index.html">💰 Expense Tracker</a>

      <div class="collapse navbar-collapse">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link" href="categories.html">Categories</a></li>
          <li class="nav-item"><a class="nav-link" href="expenses.html">Expenses</a></li>
          <li class="nav-item"><a class="nav-link active" href="reports.html">Reports</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <!-- Main Container -->
  <div class="container mt-4">
    <h2 class="text-center mb-4">📊 Expense Reports</h2>

    <!-- Monthly Report -->
    <div class="card p-4 shadow-sm mb-4">
      <h5>Monthly Expense Report</h5>
      <canvas id="monthlyChart" height="120"></canvas>
    </div>
  </div>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

  <!-- Script -->
  <script>
    const REPORT_API = "http://127.0.0.1:8000/api/reports/monthly/";

    async function loadMonthlyReport() {
      const res = await fetch(REPORT_API);
      const data = await res.json();

      const labels = data.map(item => {
        const date = new Date(item.month);
        return date.toLocaleString('default', { month: 'short', year: 'numeric' });
      });

      const totals = data.map(item => item.total);

      const ctx = document.getElementById("monthlyChart").getContext("2d");

      new Chart(ctx, {
        type: "bar",
        data: {
          labels: labels,
          datasets: [{
            label: "Total Expenses (₹)",
            data: totals,
            backgroundColor: "rgba(75, 192, 192, 0.6)",
            borderColor: "rgba(75, 192, 192, 1)",
            borderWidth: 1
          }]
        },
        options: {
          responsive: true,
          plugins: {
            legend: { display: true },
            tooltip: { enabled: true }
          },
          scales: {
            y: {
              beginAtZero: true,
              ticks: {
                callback: value => "₹" + value
              }
            }
          }
        }
      });
    }

    // Back Button Logic
    function goBack() {
      if (document.referrer && document.referrer !== window.location.href) {
        window.history.back();
      } else {
        window.location.href = "index.html";
      }
    }

    // Init
    loadMonthlyReport();
  </script>

</body>
</html>
